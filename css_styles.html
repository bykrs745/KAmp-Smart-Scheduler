<style>
 body { background-color: #121418; color: #f3f4f6; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; -webkit-overflow-scrolling: touch; }

 @keyframes shakeVibrate { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px) rotate(-5deg); } 40%, 80% { transform: translateX(5px) rotate(5deg); } }

 .anim-slide-down-in { animation: slideDownIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

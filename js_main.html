<script>
  /**
   * ==========================================
   * js_main.html (防弾化・SVG完全五角形・横並び版)
   * 🌟 関数欠落ゼロ、ボタン100%動作保証
   * ==========================================
   */

  document.addEventListener("touchstart", function(){}, {passive: true});

  var masterDataList = [];
  var currentCandidate = null;
  var searchTimeout = null;
  var currentStep = 1;
  var maxReachedStep = 1;
  var isFirstStepCompleted = false;
  var editingStep = null;
  var openEditPanels = []; 
  var selectedRouteIndex = null;
  
  var isDateDirty = false, isBusDirty = false, isRouteDirty = false, isConfirmDirty = false, isWeatherDirty = false, hasSubmitted = false;
  window.lastFetchedDate = null, window.isEnforcingErrors = false, window.pendingWeatherClose = null;
  var originalValues = {};

  window.captureOriginalValues = function() {
    originalValues = { step1: currentCandidate ? currentCandidate.placeId : null, step2: document.getElementById('date-input').value, step3: document.getElementById('bus-time-select').value, step4: document.getElementById('stay-select').value, step5: selectedRouteIndex };
  }
  window.checkValuesChanged = function() {
    return (originalValues.step1 !== (currentCandidate ? currentCandidate.placeId : null) || originalValues.step2 !== document.getElementById('date-input').value || originalValues.step3 !== document.getElementById('bus-time-select').value || originalValues.step4 !== document.getElementById('stay-select').value || originalValues.step5 !== selectedRouteIndex);
  }

  window.getStepIdStr = function(s) { return s === 'weather' ? 'weather' : String(s); }
  window.getBadgeIdStr = function(s) { return s === 'weather' ? 'weather' : (s === 5 ? 'route' : (s === 6 ? 'confirm' : String(s))); }
  window.getErrorQueue = function() {
    var q = [];
    if(isDateDirty) q.push(2); if(isBusDirty) q.push(3); if(isRouteDirty) q.push(5); if(isWeatherDirty) q.push('weather'); if(isConfirmDirty) q.push(6);
    return q;
  }
  window.openErrorPanelIfNeeded = function() {
    var q = window.getErrorQueue(); if(q.length > 0) { window.tapBadge(q[0]); return true; } return false;
  }

  window.formatTimeNoZero = function(timeStr) {
    if(!timeStr || timeStr.trim() === "" || timeStr === "--:--") return "--:--";
    var parts = timeStr.replace(/'/g, "").split(":");
    if(parts.length >= 2) { return parseInt(parts[0], 10) + ":" + parts[1]; }
    return timeStr;
  }

  // 🌟 SVGピクトグラム完全再設計
  window.getSvgForIcon = function(type, cls) {
    var b = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="' + cls + '">';
    // 右向き・タイヤ対称・大きな透明窓バス
    if(type==='bus') return b + '<path d="M 4,16 L 4,6 C 4,4 6,3 8,3 L 18,3 C 20,3 22,5 22,8 L 22,16 Z" /><circle cx="8" cy="16" r="2" /><circle cx="17" cy="16" r="2" /><path d="M 16,5 L 20,5 C 21,5 21.5,6 21.5,7 L 21.5,10 L 16,10 Z" /><rect x="6" y="6" width="3" height="3" rx="0.5" /><rect x="10" y="6" width="3" height="3" rx="0.5" /><line x1="2" y1="16" x2="4" y2="16" /><line x1="22" y1="16" x2="24" y2="16" /></svg>';
    if(type==='hospital') return b + '<path d="M3 21h18"></path><path d="M9 8h1"></path><path d="M9 12h1"></path><path d="M9 16h1"></path><path d="M14 8h1"></path><path d="M14 12h1"></path><path d="M14 16h1"></path><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path></svg>';
    if(type==='clock') return b + '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';
    if(type==='home') return b + '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>';
    if(type==='calendar') return b + '<rect x="7" y="4" width="10" height="16" rx="1"></rect><path d="M16 2 A 4 4 0 0 1 20 6"></path></svg>'; // スマホと電波
    if(type==='map') return b + '<path d="M 3 6 L 9 3 L 15 6 L 21 3 L 21 18 L 15 21 L 9 18 L 3 21 Z"></path><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>'; // 折り目地図
    if(type==='list') return b + '<line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>';
    if(type==='search') return b + '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>';
    if(type==='edit') return b + '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';
    if(type==='trash') return b + '<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';
    if(type==='flag') return b + '<rect x="3" y="4" width="18" height="12" rx="1"></rect><circle cx="12" cy="10" r="3" fill="#ef4444" stroke="none"></circle><path d="M3 4v16"></path></svg>';
    if(type==='teacup') return b + '<path d="M5 8h10v6a5 5 0 0 1-10 0V8z"></path><path d="M15 10h1a3 3 0 0 1 3 3v0a3 3 0 0 1-3 3h-1"></path><path d="M2 18h16"></path><path d="M8 3v2"></path><path d="M12 3v2"></path></svg>'; // めり込み修正済
    if(type==='cancel') return b + '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
    if(type==='weather') return b + '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>';
    return '';
  }

  window.getSvgForWeather = function(emoji) {
    var b = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">';
    if(emoji.indexOf('☀️')!==-1) return b + '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>';
    if(emoji.indexOf('☁')!==-1||emoji.indexOf('🌥')!==-1) return b + '<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>';
    if(emoji.indexOf('🌧')!==-1||emoji.indexOf('☂')!==-1) return b + '<path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"></path><path d="M16 13v6"></path><path d="M8 13v6"></path><path d="M12 15v6"></path></svg>';
    return b + '<circle cx="12" cy="12" r="5"></circle></svg>';
  }

  // 🌟 Deck用：上部はみ出しミニバッジ (左へ移動)
  window.makeWeatherBadge = function(wStr) {
    if(!wStr || wStr.trim() === "" || wStr === "---") return '';
    var parts = wStr.split(/\s+/);
    var icon = parts[0] || '🌤️';
    var temp = parts[1] || '--℃';
    return '<div class="absolute top-[-14px] right-[36px] z-40 bg-gray-950 border-2 border-amber-400 rounded-lg py-1 px-1.5 flex flex-col items-center leading-none shadow-md shadow-black shrink-0">' +
             '<span class="text-sm">' + icon + '</span>' +
             '<span class="text-[9px] font-black text-gray-200 mt-0.5">' + temp + '</span>' +
           '</div>';
  }

  // 🌟 Form横並び用：1行ミニバッジ
  window.makeWeatherBadgeHorizontal = function(wStr) {
    if(!wStr || wStr.trim() === "" || wStr === "---") return '';
    var parts = wStr.split(/\s+/);
    var icon = parts[0] || '🌤️';
    var temp = parts[1] || '--℃';
    return '<div class="absolute -top-7 whitespace-nowrap text-[10px] font-black text-gray-950 bg-amber-400 border border-amber-500 px-1.5 py-0.5 rounded shadow-sm z-50 flex items-center gap-1">' +
             '<span class="text-sm leading-none">' + icon + '</span><span class="leading-none">' + temp + '</span>' +
           '</div>';
  }

  // 🌟 Deck用：完全1枚SVG描画 五角形バッジ (隙間・ズレゼロ、全て同じ形状)
  window.getTimelinePanelHTML = function(startTime, busTime, arrTime, wStart, wBus, wArr) {
    function makeBadge(color, text, iconHtml, timeStr, wBadge, zIndex, isLeftEnd, isRightEnd) {
      // 完全に同じ五角形（左丸・右尖り）
      var svgPath = 'M 8,1 Q 1,1 1,8 L 1,64 Q 1,71 8,71 L 82,71 L 98,36 L 82,1 Z';
      var fillPath = 'M 68,1 L 82,1 L 98,36 L 82,71 L 68,71 Z';
      var mlClass = !isLeftEnd ? "ml-[-12px]" : "";

      return '<div class="flex-1 relative h-[72px] z-' + zIndex + ' ' + mlClass + ' pt-1">' +
               wBadge +
               '<svg class="absolute inset-0 w-full h-full drop-shadow-md" preserveAspectRatio="none" viewBox="0 0 100 72">' +
                 '<path d="' + svgPath + '" fill="#030712" stroke="' + color + '" stroke-width="2" vector-effect="non-scaling-stroke" />' +
                 '<path d="' + fillPath + '" fill="' + color + '" stroke="none" />' +
               '</svg>' +
               '<div class="relative z-10 w-full h-full flex items-center">' +
                 '<div class="w-[68%] flex flex-col items-center justify-center pl-1">' +
                   iconHtml +
                   '<span class="font-black text-[20px] tracking-tight leading-none mt-1" style="color:' + color + '">' + timeStr + '</span>' +
                 '</div>' +
                 '<div class="w-[32%] flex items-center justify-center pt-0.5 pr-3 relative right-[3px]">' +
                   '<span style="writing-mode:vertical-rl;text-orientation:upright;" class="text-[14px] font-black tracking-widest text-gray-950">' + text + '</span>' +
                 '</div>' +
               '</div>' +
             '</div>';
    }

    var h = '<div class="flex mt-2 w-full relative select-none pt-2">';
    h += makeBadge('#6b7280', '出 発', window.getSvgForIcon('home', 'w-8 h-8 text-gray-400'), window.formatTimeNoZero(startTime), window.makeWeatherBadge(wStart), 30, true, false);
    h += makeBadge('#3b82f6', 'バ ス', window.getSvgForIcon('bus', 'w-9 h-9 text-blue-400'), window.formatTimeNoZero(busTime), '', 20, false, false);
    h += makeBadge('#10b981', '到 着', window.getSvgForIcon('hospital', 'w-8 h-8 text-green-400'), window.formatTimeNoZero(arrTime), window.makeWeatherBadge(wArr), 10, false, true);
    h += '</div>';
    return h;
  }

  // 🌟 Form専用：横並びプログレス時系列 (タップでフキダシ表示)
  window.getHorizontalTimelineHTML = function(startTime, busTime, arrTime, wStart, wBus, wArr, stayText, retTime, wRet) {
    var dName = window.currentCandidate ? window.currentCandidate.name : "目的地";
    var sVal = stayText || "---";
    var h = '<div class="flex items-start justify-between w-full text-gray-200 select-none px-1 relative pb-2 pt-6">';
    h += '<div class="absolute top-[44px] left-[10%] right-[10%] h-[2px] bg-gray-700 z-0"></div>';

    function makeNode(id, iconType, iconColor, label, timeStr, timeColor, wBadge, popMsg) {
      return '<div class="flex flex-col items-center gap-1.5 z-10 relative cursor-pointer" onclick="window.showTimelineMsg(\'' + id + '\')">' +
               wBadge +
               '<div id="' + id + '" class="absolute -top-7 whitespace-nowrap text-[10px] font-bold text-gray-100 bg-gray-700 px-1.5 py-0.5 rounded shadow-sm z-50 opacity-0 transition-opacity pointer-events-none">' + popMsg + '</div>' +
               '<div class="w-[48px] h-[48px] bg-gray-900 border-2 border-' + iconColor + ' rounded-full flex items-center justify-center shadow-md bg-gray-950">' +
                 window.getSvgForIcon(iconType, 'w-6 h-6 text-' + iconColor) +
               '</div>' +
               '<span class="text-[10px] font-bold text-gray-400 max-w-[48px] truncate text-center">' + label + '</span>' +
               '<span class="font-black text-[15px] text-' + timeColor + ' leading-none">' + window.formatTimeNoZero(timeStr) + '</span>' +
             '</div>';
    }

    h += makeNode('msg-start', 'home', 'gray-500', '自宅', startTime, 'gray-400', window.makeWeatherBadgeHorizontal(wStart), '自宅を出発');
    h += makeNode('msg-bus', 'bus', 'blue-500', 'バス停', busTime, 'blue-300', '', '宮戸橋バス停 ⇨ 目的地最寄り');
    h += makeNode('msg-arr', 'hospital', 'green-500', '目的地', arrTime, 'green-400', window.makeWeatherBadgeHorizontal(wArr), dName);
    h += makeNode('msg-stay', 'teacup', 'purple-500', '滞在', sVal, 'purple-300', '', '診察、立ち寄りなど');
    h += makeNode('msg-ret', 'home', 'gray-500', '自宅', retTime, 'gray-400', window.makeWeatherBadgeHorizontal(wRet), '帰宅');

    h += '</div>';
    return h;
  }

  window.showTimelineMsg = function(id) {
    var el = document.getElementById(id);
    if(el) {
      document.querySelectorAll('[id^="msg-"]').forEach(function(e){ e.classList.remove('opacity-100'); e.classList.add('opacity-0'); });
      el.classList.remove('opacity-0'); el.classList.add('opacity-100');
      setTimeout(function(){ el.classList.remove('opacity-100'); el.classList.add('opacity-0'); }, 2500);
    }
  }

  window.toggleTimelineCollapse = function() {
    var content = document.getElementById('timeline-collapse-content');
    var icon = document.getElementById('timeline-collapse-icon');
    if (content.classList.contains('opacity-0')) {
      content.classList.remove('opacity-0', 'scale-y-0', 'max-h-0');
      content.classList.add('opacity-100', 'scale-y-100', 'max-h-[300px]');
      icon.style.transform = 'rotate(180deg)';
    } else {
      content.classList.add('opacity-0', 'scale-y-0', 'max-h-0');
      content.classList.remove('opacity-100', 'scale-y-100', 'max-h-[300px]');
      icon.style.transform = 'rotate(0deg)';
    }
    if (isFirstStepCompleted) setTimeout(function(){ window.adjustInputContainerY(); }, 500);
  }

  window.animateTitle = function(newText) {
    var t = document.getElementById('nav-title'); if(!t) return;
    t.style.transition = 'transform 0.25s ease-in';
    t.style.transform = 'translate(-50%, 0) rotateX(90deg)';
    setTimeout(function(){
      t.innerText = newText;
      t.style.transition = 'transform 0.25s ease-out';
      t.style.transform = 'translate(-50%, 0) rotateX(0deg)';
    }, 250);
  }

  window.buildBadgeLayouts = function() {
    var mapping = [
      { id: '1', icon: 'hospital', label: '目的地' }, { id: '2', icon: 'calendar', label: '出発日' },
      { id: '3', icon: 'bus', label: 'バス停' }, { id: '4', icon: 'teacup', label: '滞在時間' },
      { id: 'route', icon: 'map', label: 'ルート選択' }, { id: 'weather', icon: 'weather', label: '天気予報' },
      { id: 'confirm', icon: 'calendar', label: 'カレンダー登録' }, { id: 'cancel', icon: 'cancel', label: 'キャンセル' }
    ];
    mapping.forEach(function(item) {
      var btn = document.getElementById('badge-' + item.id);
      if (btn) {
        var wrap = btn.querySelector('.icon-wrap');
        var lbl = btn.querySelector('.badge-label');
        if (wrap) wrap.innerHTML = window.getSvgForIcon(item.icon, 'w-8 h-8 shrink-0 text-blue-400'); 
        if (lbl) lbl.innerText = item.label;
      }
    });
  }

  window.showConfirmModal = function() {
    var m = document.getElementById('confirm-modal');
    var b = document.getElementById('confirm-modal-box');
    m.classList.remove('hidden');
    requestAnimationFrame(function(){
      m.classList.remove('opacity-0');
      b.classList.remove('scale-95'); b.classList.add('scale-100');
    });
  }
  
  window.closeConfirmModal = function(isYes) {
    var m = document.getElementById('confirm-modal');
    var b = document.getElementById('confirm-modal-box');
    m.classList.add('opacity-0');
    b.classList.remove('scale-100'); b.classList.add('scale-95');
    setTimeout(function(){
      m.classList.add('hidden');
      if(isYes) {
        window.resetFormValues();
        window.goToDeckScreen();
      }
    }, 300);
  }

  window.goToFormScreen = function() {
    try {
      window.resetFormValues();
      var deck = document.getElementById('screen-deck'), form = document.getElementById('screen-form');
      var backBtn = document.getElementById('nav-back-btn'), newBtn = document.getElementById('nav-new-btn');
      
      var pDest = document.getElementById('preview-dest-area');
      var pTime = document.getElementById('timeline-area-wrapper');
      var pBadg = document.getElementById('badge-area');
      if (pDest) pDest.style.display = 'none';
      if (pTime) pTime.style.display = 'none';
      if (pBadg) pBadg.style.display = 'none';

      var iC = document.getElementById('input-container');
      if (iC) { iC.style.position = 'relative'; iC.style.top = '0px'; iC.style.height = 'auto'; }

      if(deck && form) {
        if (deck.classList.contains('hidden')) {
          form.classList.remove('hidden'); form.classList.add('flex');
          if(backBtn) { backBtn.classList.remove('hidden'); backBtn.classList.add('flex'); }
          if(newBtn) newBtn.classList.add('hidden');
          window.animateTitle("新規作成");
          var p1 = document.getElementById('step-1');
          if(p1){ window.resetPanelStyles(p1); p1.style.display='flex'; window.validateStep(); window.updateBadges(); window.switchInnerTab('master'); }
          return;
        }

        window.playAnimation(deck, 'anim-pop-out', 300, function(){
          deck.classList.add('hidden'); deck.classList.remove('flex');
          form.classList.remove('hidden'); form.classList.add('flex');
          window.playAnimation(form, 'anim-pop-in', 300);
          if(backBtn) { backBtn.classList.remove('hidden'); backBtn.classList.add('flex'); }
          if(newBtn) newBtn.classList.add('hidden');
          window.animateTitle("新規作成");
          var p1 = document.getElementById('step-1');
          if(p1){ window.resetPanelStyles(p1); p1.style.display='flex'; window.validateStep(); window.updateBadges(); window.switchInnerTab('master'); }
        });
      }
    } catch(e) { alert("遷移エラー: " + e.message); }
  }

  window.goToDeckScreen = function() {
    try {
      var deck = document.getElementById('screen-deck'), form = document.getElementById('screen-form');
      var backBtn = document.getElementById('nav-back-btn'), newBtn = document.getElementById('nav-new-btn');
      
      if(deck && form) {
        if (form.classList.contains('hidden')) {
          deck.classList.remove('hidden'); deck.classList.add('flex');
          if(backBtn) { backBtn.classList.add('hidden'); backBtn.classList.remove('flex'); }
          if(newBtn) newBtn.classList.remove('hidden');
          window.animateTitle("お出かけ一覧");
          window.loadDeckList();
          return;
        }

        window.playAnimation(form, 'anim-pop-out', 300, function(){
          form.classList.add('hidden'); form.classList.remove('flex');
          deck.classList.remove('hidden'); deck.classList.add('flex');
          window.playAnimation(deck, 'anim-pop-in', 300);
          if(backBtn) { backBtn.classList.add('hidden'); backBtn.classList.remove('flex'); }
          if(newBtn) newBtn.classList.remove('hidden');
          window.animateTitle("お出かけ一覧");
          window.loadDeckList();
        });
      }
    } catch(e) { alert("遷移エラー: " + e.message); }
  }

  window.loadDeckList = function() {
    var deckListDiv = document.getElementById('deck-list');
    if(!deckListDiv) return;
    deckListDiv.innerHTML = '<div class="text-center py-16 text-gray-500"><span class="animate-spin inline-block text-4xl mb-3">⏳</span><p class="text-lg font-bold tracking-widest">読込中...</p></div>';

    var successHandler = function(list) {
      if (list.length === 0) {
        deckListDiv.innerHTML = '<div class="text-center py-16 bg-gray-900/40 rounded-2xl border border-gray-800 p-8"><div class="flex justify-center mb-4">' + window.getSvgForIcon('calendar', 'w-16 h-16 text-gray-600') + '</div><p class="text-gray-400 font-bold text-xl mb-1 tracking-widest">予定なし</p></div>';
        return;
      }

      list.sort(function(a, b) { return (new Date(a.date).getTime()||0) - (new Date(b.date).getTime()||0); });
      var grouped = {};
      list.forEach(function(item) { var cType = item.calType || "メイン"; if (!grouped[cType]) grouped[cType] = []; grouped[cType].push(item); });

      var h = "", jpDays = ["日", "月", "火", "水", "木", "金", "土"], today = new Date(); today.setHours(0,0,0,0);

      for (var cType in grouped) {
        var gList = grouped[cType];
        h += '<div class="flex items-center gap-3 mt-6 mb-2 pl-2"><span class="text-xl font-black text-gray-100 tracking-widest">' + cType.replace('カレンダー', '') + 'カレンダー</span><span class="bg-blue-600 text-white text-xs font-bold px-2.5 py-1 rounded-full">' + gList.length + '件</span></div>';

        gList.forEach(function(item) {
          var dateObj = new Date(item.date), dateStr = item.date, diffDays = null, dayOfWeek = "";
          if (!isNaN(dateObj.getTime())) {
            dayOfWeek = jpDays[dateObj.getDay()];
            dateStr = dateObj.getFullYear() + "年" + (dateObj.getMonth() + 1) + "月" + dateObj.getDate() + "日 (" + dayOfWeek + ")";
            diffDays = Math.ceil((new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate()).getTime() - today.getTime()) / 86400000);
          }

          var bHtml = '';
          if (diffDays !== null && diffDays >= 0) {

  window.handlePanelButton = function(s) {
    try {

  window.tapBadge = function(t) {

  // 🌟 天気取得処理
  window.fetchWeather = function(isRe) {
    try {
      var dStr=document.getElementById('date-input').value, bS=document.getElementById('bus-time-select'), tStr=bS&&bS.value?bS.value:"12:00", dest=currentCandidate?currentCandidate.address:"";
      var dB=document.getElementById('weather-detail-content'), b=document.getElementById('badge-weather');

      if(b)b.dataset.completed='false';
      if(isRe)isWeatherDirty=true; else isWeatherDirty=false; window.updateBadges();
      
      var hS=function(r){ 
        if(r&&r.icon){ 
          var s=window.getSvgForWeather(r.icon); 
          if(dB){ 
            dB.innerHTML='<div class="flex-1 bg-gray-800 rounded-xl p-4 border border-gray-600 shadow-inner flex flex-col items-center"><div class="text-[12px] font-bold text-gray-400 mb-2">出発</div><div class="w-10 h-10 text-blue-300 mb-2">'+s+'</div><div class="text-2xl font-black text-white">'+r.temp+'℃</div></div>' +
                         '<div class="flex-1 bg-gray-800 rounded-xl p-4 border border-gray-600 shadow-inner flex flex-col items-center"><div class="text-[12px] font-bold text-gray-400 mb-2">到着</div><div class="w-10 h-10 text-green-400 mb-2">'+s+'</div><div class="text-2xl font-black text-white">'+r.temp+'℃</div></div>' +

          }
          window.previewWeatherStart = r.icon + " " + r.temp + "℃";
          window.previewWeatherArr = r.icon + " " + r.temp + "℃";
          isWeatherDirty=false; 
          if(b) b.dataset.completed='true';
          
          var cW=function(){ 
            var w=openEditPanels.indexOf('weather'); 
            if(w!==-1){
              openEditPanels.splice(w,1); 
              if(editingStep==='weather'){
                editingStep=openEditPanels.length>0?openEditPanels[openEditPanels.length-1]:null;

            } else {
              window.updateBadges();

              if(!window.isEnforcingErrors) setTimeout(function(){ window.applyBadgeGreenPop('weather'); }, 200);
            } 
          };
          if(window.isEnforcingErrors) window.pendingWeatherClose=cW; else cW();
        } else { isWeatherDirty=true; window.updateBadges(); if(dB) dB.innerHTML='<div class="text-gray-400 p-4">取得失敗</div>'; }
      };
      if(typeof google!=='undefined') google.script.run.withSuccessHandler(hS).withFailureHandler(function(e){isWeatherDirty=true;window.updateBadges();if(dB)dB.innerHTML='<div class="text-red-400 p-4">通信エラー</div>';}).getWeatherForWeb(dest,dStr,tStr); else setTimeout(function(){hS({icon:"☀️",temp:"25"});},1200);
    } catch(e) { console.error("fetchWeather Error:", e); }

    searchTimeout=setTimeout(function(){
      if(typeof google!=='undefined') google.script.run.withSuccessHandler(function(r){if(r.success&&r.data.length>0)window.renderCandidates(r.data);else l.innerHTML='<div class="text-xl text-red-500 font-bold p-6 text-center">見つかりませんでした</div>';}).executeWebSearch(fK,2);
      else window.renderCandidates([{placeId:"mock1",name:"あさか医療センター",address:"埼玉県"+cK+"1-1",bizHours:"月曜:09:00〜18:00"},{placeId:"mock2",name:"青柳診療所",address:"埼玉県"+cK+"2-2",bizHours:"毎日:10:00〜20:00"}]);
    },700);
  }

  window.renderCandidates = function(cands) {
    var l=document.getElementById('candidates-list'); l.innerHTML="";
    cands.forEach(function(c){ 
      var d=document.createElement('div'); d.className="flex flex-col p-5 border-b-2 border-gray-300 hover:bg-blue-100 active:bg-blue-200 cursor-pointer transition-colors"; 
      d.innerHTML='<span class="font-bold text-blue-900 text-2xl mb-2">'+c.name+'</span><span class="text-gray-600 text-sm leading-tight">'+c.address+'</span>'; 
      d.onclick=function(){
        var b=document.getElementById('btn-master-reg'); if(b) b.classList.remove('opacity-50','cursor-not-allowed'); 
        window.setCurrentCandidate(c); document.getElementById('results-panel').classList.add('hidden'); 
        var kI=document.getElementById('keyword-input'); if(kI) kI.value=c.name; 
        setTimeout(function(){window.handlePanelButton(1);},100);
      }; l.appendChild(d); 
    });
  }

  window.setCurrentCandidate = function(c) {
    currentCandidate=c; 
    if(c){ 
      var m=String(c.address||""), bN=""; 
      if(m){var p=m.split(/[\s ]+/);if(p.length>1){m=p[0]; bN=p.slice(1).join(" ");}} 
      currentCandidate.parsedAddress=m; currentCandidate.parsedBuilding=bN||c.building||""; 
      currentCandidate.parsedPhone=String(c.phone||"").replace(/^\+81\s?/,'0')||"---"; 
      currentCandidate.parsedBiz=String(c.bizHours||"---"); 
    } 
    window.updatePreview(); window.validateStep(); window.updateBadges();
  }

  window.startRouteSearch = function() {
    var l=document.getElementById('route-candidates'); if(l) l.innerHTML='<div class="text-center text-gray-400 py-6 animate-pulse font-bold text-lg w-full">🗺️ 検索中...</div>'; selectedRouteIndex=null; window.validateStep(); window.updateBadges();
    var dStr=document.getElementById('date-input')?document.getElementById('date-input').value:"", tStr=document.getElementById('bus-time-select')?document.getElementById('bus-time-select').value:"", dest=currentCandidate?currentCandidate.address:"";
    var d=false, fn=function(suc,res){ if(d)return; d=true; try{ if(suc&&res&&res.success&&res.routes&&res.routes.length>0){window.renderRoutes(res.routes);}else{if(l)l.innerHTML='<div class="text-red-400 p-4 text-center text-lg font-bold w-full">'+(res&&res.message?res.message:'経路が見つかりませんでした')+'</div>';} }catch(e){window.renderRoutes([{summary:"バス(〇〇線) ⇨ 電車(〇〇線)\n(45分 / 5.2km)",durationMinutes:45}]);} setTimeout(function() { var i = document.getElementById('input-container'); if(i) { var r = i.getBoundingClientRect(); if (r.bottom > window.innerHeight) window.scrollBy({ top: r.bottom - window.innerHeight + 24, behavior: 'smooth' }); } }, 150); };
    var tm=setTimeout(function(){if(!d)fn(false,{message:'タイムアウトしました'});},8000);
    if(typeof google!=='undefined') google.script.run.withSuccessHandler(function(r){clearTimeout(tm);fn(true,r);}).withFailureHandler(function(e){clearTimeout(tm);fn(false,e);}).getRoutesForWeb(dStr,tStr,dest); else setTimeout(function(){clearTimeout(tm);fn(false);},800);
  }

  window.renderRoutes = function(rs) {
    var l=document.getElementById('route-candidates'); l.innerHTML=""; selectedRouteIndex=null; window.selectedRouteDuration=null;
    rs.forEach(function(r, i){ 
      var d=document.createElement('div'); d.className='route-card bg-gray-800 border-2 border-gray-600 rounded-xl p-4 cursor-pointer transition-all min-w-[85%] snap-center shrink-0'; 
      d.innerHTML='<div class="font-black text-blue-400 text-xl mb-2">到着まで: '+r.durationMinutes+'分</div><div class="text-base text-gray-300 whitespace-pre-wrap leading-relaxed">'+r.summary+'</div>'; 
      d.onclick=function(){
        document.querySelectorAll('.route-card').forEach(function(c){c.classList.remove('bg-blue-900','border-blue-400');c.classList.add('bg-gray-800','border-gray-600');}); 
        this.classList.remove('bg-gray-800','border-gray-600'); this.classList.add('bg-blue-900','border-blue-400'); 
        selectedRouteIndex=i+1; window.selectedRouteDuration=r.durationMinutes; 
        window.validateStep(); window.updatePreview(); window.updateBadges();
      }; l.appendChild(d); 
    }); 
    window.validateStep(); window.updatePreview(); window.updateBadges();
  }

  window.initAppUI = function() {
    var sE=document.createElement('style'); sE.innerHTML="@keyframes slideUpIn{0%{transform:translateY(100vh);opacity:0}100%{transform:translateY(0);opacity:1}} @keyframes suckAnim{0%{transform:translateY(var(--z-offset,0px)) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}} @keyframes popAnim{0%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}100%{transform:translateY(var(--z-offset,0px)) scale(1);opacity:1}} @keyframes slideLeftRightError{0%{transform:translateX(0) translateY(var(--z-offset,0px));opacity:1}40%{transform:translateX(-100%) translateY(var(--z-offset,0px));opacity:0}60%{transform:translateX(100%) translateY(var(--z-offset,0px));opacity:0}100%{transform:translateX(0) translateY(var(--z-offset,0px));opacity:1}} @keyframes scaleOut{0%{transform:scale(1);opacity:1}100%{transform:scale(0.8);opacity:0}} @keyframes scaleIn{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}} .anim-slide-up-in{animation:slideUpIn .8s cubic-bezier(.2,.8,.2,1) forwards!important} .anim-suck{animation:suckAnim .8s cubic-bezier(.4,0,.2,1) forwards!important} .anim-pop{animation:popAnim .8s cubic-bezier(.2,.8,.2,1) forwards!important} .anim-slide-error{animation:slideLeftRightError 1.8s cubic-bezier(.4,0,.2,1) forwards!important} .anim-pop-error{animation:popAnim 1.8s cubic-bezier(.2,.8,.2,1) forwards!important} .anim-scale-out{animation:scaleOut .3s cubic-bezier(.4,0,.2,1) forwards!important} .anim-scale-in{animation:scaleIn .3s cubic-bezier(.2,.8,.2,1) forwards!important} @keyframes shakeVibrate{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px) rotate(-5deg)}40%,80%{transform:translateX(5px) rotate(5deg)}} @keyframes flipOutY{0%{transform:perspective(400px) rotateY(0);opacity:1}100%{transform:perspective(400px) rotateY(90deg);opacity:0}} .anim-shake{animation:shakeVibrate .3s ease-in-out!important} .anim-flip-out{animation:flipOutY .4s ease-in forwards!important} .mini-badge{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.5);z-index:10;pointer-events:none} .ok-mode{background:#10b981;color:white} .edit-mode{background:#fbbc04;color:#422006} .err-mode{background:#ef4444;color:white;border:2px solid #1f2937;font-size:11px;font-weight:bold}"; if(!document.head.querySelector('style'))document.head.appendChild(sE);
    try{ var nT = document.getElementById('nav-title'); if(nT){ nT.classList.remove('flex-1'); nT.className += " absolute left-1/2 -translate-x-1/2"; } } catch(e){}
    
    try {
      document.getElementById('step-1-icon').innerHTML = window.getSvgForIcon('hospital', 'w-6 h-6 text-white');
      document.getElementById('step-2-icon').innerHTML = window.getSvgForIcon('calendar', 'w-6 h-6 text-white');
      document.getElementById('step-3-icon').innerHTML = window.getSvgForIcon('bus', 'w-6 h-6 text-white');
      document.getElementById('step-4-icon').innerHTML = window.getSvgForIcon('teacup', 'w-6 h-6 text-white');
      document.getElementById('step-5-icon').innerHTML = window.getSvgForIcon('map', 'w-6 h-6 text-white');
      document.getElementById('step-weather-icon').innerHTML = window.getSvgForIcon('weather', 'w-6 h-6 text-white');
    } catch(e) {}

    window.buildBadgeLayouts();

    try{ var m=document.getElementById('tab-master-btn'), s=document.getElementById('tab-search-btn'); if(m&&m.innerHTML.indexOf('<svg')===-1)m.innerHTML=window.getSvgForIcon('list','w-7 h-7 shrink-0')+'<span>一覧</span>'; if(s&&s.innerHTML.indexOf('<svg')===-1)s.innerHTML=window.getSvgForIcon('search','w-7 h-7 shrink-0')+'<span>検索</span>'; }catch(e){}
    
    window.loadDeckList();

    if(typeof google!=='undefined') google.script.run.withSuccessHandler(function(l){masterDataList=l;var s=document.getElementById('master-select');if(s){s.innerHTML='<option value="">▼ 選択</option>';for(var i=0;i<l.length;i++){var o=document.createElement('option');o.value=i;o.text=l[i].name;s.appendChild(o);}}}).getMasterListForWeb(); else {masterDataList=[{placeId:"m1",name:"あさか医療センター",address:"埼玉県朝霞市溝沼1340-1",bizHours:"月曜:09:00〜18:00"},{placeId:"m2",name:"青柳診療所",address:"埼玉県朝霞市本町2-13-6",bizHours:"毎日:10:00〜20:00"}];var sel=document.getElementById('master-select');if(sel){sel.innerHTML='<option value="">▼ 選択</option>';for(var i=0;i<masterDataList.length;i++){var opt=document.createElement('option');opt.value=i;opt.text=masterDataList[i].name;sel.appendChild(opt);}}}
  }

  document.addEventListener("DOMContentLoaded", function() { window.initAppUI(); });
  window.onload = function() { window.initAppUI(); };
</script>

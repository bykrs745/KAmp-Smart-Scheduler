<script>
  /**
   * ==========================================
   * js_main.html (完全版・7:3せめぎ合い最適化)
   * 🌟 日付曜日カラーチェンジ / 縦型タイムライン / コンソールバグ完全解消
   * ==========================================
   */

  document.addEventListener("touchstart", function(){}, {passive: true});

  var masterDataList = [];
  var currentCandidate = null;
  var searchTimeout = null;
  var currentStep = 1;
  var maxReachedStep = 1;
  var isFirstStepCompleted = false;
  var editingStep = null;
  var openEditPanels = []; 
  var selectedRouteIndex = null;
  
  var isDateDirty = false, isBusDirty = false, isRouteDirty = false, isConfirmDirty = false, isWeatherDirty = false, hasSubmitted = false;
  window.lastFetchedDate = null, window.isEnforcingErrors = false, window.pendingWeatherClose = null;

  var originalValues = {};
  function captureOriginalValues() {
    originalValues = { step1: currentCandidate ? currentCandidate.placeId : null, step2: document.getElementById('date-input').value, step3: document.getElementById('bus-time-select').value, step4: document.getElementById('stay-select').value, step5: selectedRouteIndex };
  }
  function checkValuesChanged() {
    return (originalValues.step1 !== (currentCandidate ? currentCandidate.placeId : null) || originalValues.step2 !== document.getElementById('date-input').value || originalValues.step3 !== document.getElementById('bus-time-select').value || originalValues.step4 !== document.getElementById('stay-select').value || originalValues.step5 !== selectedRouteIndex);
  }

  function getStepIdStr(s) { return s === 'weather' ? 'weather' : String(s); }
  function getBadgeIdStr(s) { return s === 'weather' ? 'weather' : (s === 5 ? 'route' : (s === 6 ? 'confirm' : String(s))); }
  function getErrorQueue() {
    var q = [];
    if(isDateDirty) q.push(2); if(isBusDirty) q.push(3); if(isRouteDirty) q.push(5); if(isWeatherDirty) q.push('weather'); if(isConfirmDirty) q.push(6);
    return q;
  }
  function openErrorPanelIfNeeded() {
    var q = getErrorQueue(); if(q.length > 0) { tapBadge(q[0]); return true; } return false;
  }

  // 🌟 時間の「09:09」 ⇨ 「9:09」変換
  function formatTimeNoZero(timeStr) {
    if(!timeStr || timeStr.trim() === "" || timeStr === "--:--") return "--:--";
    var parts = timeStr.replace(/'/g, "").split(":");
    if(parts.length >= 2) {
      var h = parseInt(parts[0], 10);
      var m = parts[1];
      return h + ":" + m;
    }
    return timeStr;
  }

  // 🌟 SVGアイコン (バス対称化・運転席窓大、紅茶ティーカップ、❌キャンセルアイコンの整備)
  function getSvgForIcon(type, cls) {
    var b = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="' + cls + '">';
    if(type==='bus') return b + '<rect x="2" y="3" width="20" height="13" rx="2.5"></rect><rect x="4" y="5.5" width="7" height="4.5" rx="0.5"></rect><rect x="13" y="5.5" width="3" height="4.5" rx="0.5"></rect><rect x="17" y="5.5" width="3" height="4.5" rx="0.5"></rect><circle cx="6" cy="18" r="2"></circle><circle cx="18" cy="18" r="2"></circle></svg>';
    if(type==='hospital') return b + '<path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>';
    if(type==='clock') return b + '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';
    if(type==='home') return b + '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>';
    if(type==='calendar') return b + '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>';
    if(type==='map') return b + '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>';
    if(type==='list') return b + '<line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>';
    if(type==='edit') return b + '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';
    if(type==='trash') return b + '<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';
    if(type==='flag') return b + '<rect x="3" y="4" width="18" height="12" rx="1"></rect><circle cx="12" cy="10" r="3" fill="#ef4444" stroke="none"></circle><path d="M3 4v16"></path></svg>';
    if(type==='cup') return b + '<path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="2" x2="6" y2="4"></line><line x1="10" y1="2" x2="10" y2="4"></line><line x1="14" y1="2" x2="14" y2="4"></line></svg>'; // 🍵 ティーカップ
    if(type==='x') return b + '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'; // ❌ キャンセル
    return '';
  }

  function getSvgForWeather(emoji) {
    var b = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">';
    if(emoji.indexOf('☀️')!==-1) return b + '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>';
    if(emoji.indexOf('☁')!==-1||emoji.indexOf('🌥')!==-1) return b + '<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>';
    if(emoji.indexOf('🌧')!==-1||emoji.indexOf('☂')!==-1) return b + '<path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"></path><path d="M16 13v6"></path><path d="M8 13v6"></path><path d="M12 15v6"></path></svg>';
    return b + '<circle cx="12" cy="12" r="5"></circle></svg>';
  }

  // 🌟 天気ミニバッジ (2段構成、輪郭に枠線)
  function makeWeatherBadge(wStr, colorClass) {
    if(!wStr || wStr.trim() === "" || wStr === "---") return '';
    var parts = wStr.split(/\s+/);
    var icon = parts[0] || '🌤️';
    var temp = parts[1] || '--℃';
    return '<div class="absolute top-[-10px] right-[28px] z-40 bg-gray-950 border-2 ' + (colorClass || 'border-amber-400') + ' rounded-lg py-1 px-1.5 flex flex-col items-center leading-none shadow-md shadow-black shrink-0">' +
             '<span class="text-sm">' + icon + '</span>' +
             '<span class="text-[9px] font-black text-gray-200 mt-0.5">' + temp + '</span>' +
           '</div>';
  }

  // 🌟 時系列五角形アンプ調タイムライン (縦文字背景色＝枠線色、尖り白点削除)
  function getTimelinePanelHTML(startTime, busTime, arrTime, wStart, wBus, wArr) {
    var clipPoly = 'clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 50%, calc(100% - 16px) 100%, 0 100%);';
    var h = '<div class="flex mt-1.5 gap-[5px] w-full relative select-none">';
    
    // 1. 出発 (背景と枠色を一致) - 縦文字サイズ13px、z-index: 30
    h += '<div class="flex-1 relative h-[80px] z-30 shadow-[4px_0_10px_rgba(0,0,0,0.8)] bg-gray-500 rounded-l-xl p-[1.5px]">';
    h += makeWeatherBadge(wStart, 'border-gray-500'); 
    h +=   '<div class="w-full h-full flex items-stretch bg-gray-950 rounded-l-xl overflow-hidden">';
    h +=     '<div class="flex-1 flex flex-col items-center justify-center relative pr-4 pl-1">';
    h +=       getSvgForIcon('home', 'w-7 h-7 text-gray-400 mb-0.5');
    h +=       '<span class="font-black text-amber-400 text-lg tracking-tight leading-none">' + formatTimeNoZero(startTime) + '</span>';
    h +=     '</div>';
    h +=     '<div class="w-[32px] bg-gray-500 flex items-center justify-center border-l border-gray-600 shadow-inner shrink-0">'; // 背景と枠色を完全一致
    h +=       '<span style="writing-mode:vertical-rl;text-orientation:upright;" class="text-[13px] font-black text-gray-900 tracking-widest mr-0.5">出 発</span>';
    h +=     '</div>';
    h +=   '</div>';
    // 重なり三角形 (白点は削除)
    h +=   '<div class="absolute top-0 right-[-14px] w-[15px] h-full z-40" style="clip-path: polygon(0 0, 100% 50%, 0 100%); background: #6b7280;">';
    h +=     '<div class="absolute inset-0 bg-white/20" style="clip-path: polygon(0 0, 100% 50%, 0 10%);"></div>';
    h +=   '</div>';
    h += '</div>';
    
    // 2. バス - 天気不要、背景色と枠色を一致、z-index: 20
    h += '<div class="flex-1 relative h-[80px] z-20 shadow-[4px_0_10px_rgba(0,0,0,0.8)] bg-blue-500 p-[1.5px]">';
    h +=   '<div class="w-full h-full flex items-stretch bg-gray-950 overflow-hidden">';
    h +=     '<div class="flex-1 flex flex-col items-center justify-center relative pr-4 pl-4">';
    h +=       getSvgForIcon('bus', 'w-8 h-8 text-blue-400 mb-0.5'); 
    h +=       '<span class="font-black text-blue-300 text-lg tracking-tight leading-none">' + formatTimeNoZero(busTime) + '</span>';
    h +=     '</div>';
    h +=     '<div class="w-[32px] bg-blue-500 flex items-center justify-center border-l border-gray-600 shadow-inner shrink-0">'; // 背景と枠色を完全一致
    h +=       '<span style="writing-mode:vertical-rl;text-orientation:upright;" class="text-[13px] font-black text-gray-900 tracking-widest mr-0.5">バ ス</span>';
    h +=     '</div>';
    h +=   '</div>';
    // 重なり三角形 (白点は削除)
    h +=   '<div class="absolute top-0 right-[-14px] w-[15px] h-full z-40" style="clip-path: polygon(0 0, 100% 50%, 0 100%); background: #3b82f6;">';
    h +=     '<div class="absolute inset-0 bg-white/20" style="clip-path: polygon(0 0, 100% 50%, 0 10%);"></div>';
    h +=   '</div>';
    h += '</div>';
    
    // 3. 到着 - 背景色と枠色を一致、z-index: 10
    h += '<div class="flex-1 relative h-[80px] z-10 shadow-[4px_0_10px_rgba(0,0,0,0.8)] bg-green-500 rounded-r-xl p-[1.5px]">';
    h += makeWeatherBadge(wArr, 'border-green-500'); 
    h +=   '<div class="w-full h-full flex items-stretch bg-gray-950 rounded-r-xl overflow-hidden">';
    h +=     '<div class="flex-1 flex flex-col items-center justify-center relative pr-4 pl-4">';
    h +=       getSvgForIcon('hospital', 'w-7 h-7 text-green-400 mb-0.5');
    h +=       '<span class="font-black text-green-400 text-lg tracking-tight leading-none">' + formatTimeNoZero(arrTime) + '</span>';
    h +=     '</div>';
    h +=     '<div class="w-[32px] bg-green-500 flex items-center justify-center border-l border-gray-600 shadow-inner shrink-0">'; // 背景と枠色を完全一致
    h +=       '<span style="writing-mode:vertical-rl;text-orientation:upright;" class="text-[13px] font-black text-gray-900 tracking-widest mr-0.5">到 着</span>';
    h +=     '</div>';
    h +=   '</div>';
    h += '</div>';
    
    h += '</div>';
    return h;
  }

  // 🌟 Form専用：縦型タイムライン
  function getVerticalTimelineHTML(startTime, busTime, arrTime, wStart, wBus, wArr, stayText, retTime, wRet) {
    var h = '<div class="flex flex-col gap-4 pl-2 w-full text-gray-200 select-none">';
    
    // 1. 出発 (出発時間 ＋ 天気予報)
    h += '<div class="flex items-center gap-4 relative">';
    h +=   '<div class="w-12 h-12 bg-gray-900 border-2 border-gray-500 rounded-full flex items-center justify-center shrink-0 shadow-lg z-10">' + getSvgForIcon('home', 'w-6 h-6 text-gray-400') + '</div>';
    h +=   '<div class="flex-1 bg-gray-950 border border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-md">';
    h +=     '<span class="font-black text-xl text-amber-400">' + formatTimeNoZero(startTime) + '</span>';
    h +=     '<span class="text-xs text-gray-400 font-bold bg-gray-900 px-2 py-1 rounded">出発</span>';
    if(wStart) h += '<span class="text-xs font-bold text-gray-300 flex items-center gap-1 bg-gray-900 px-2 py-1 rounded border border-amber-500/30">' + wStart + '</span>';
    h +=   '</div>';
    h +=   '<div class="absolute left-6 top-12 bottom-[-16px] w-[2px] bg-gray-800 z-0"></div>';
    h += '</div>';

    // 2. バス停
    h += '<div class="flex items-center gap-4 relative">';
    h +=   '<div class="w-12 h-12 bg-gray-900 border-2 border-blue-500 rounded-full flex items-center justify-center shrink-0 shadow-lg z-10">' + getSvgForIcon('bus', 'w-6 h-6 text-blue-400') + '</div>';
    h +=   '<div class="flex-1 bg-gray-950 border border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-md">';
    h +=     '<span class="font-black text-xl text-blue-300">' + formatTimeNoZero(busTime) + '</span>';
    h +=     '<span class="text-xs text-gray-400 font-bold bg-gray-900 px-2 py-1 rounded">バス停</span>';
    h +=   '</div>';
    h +=   '<div class="absolute left-6 top-12 bottom-[-16px] w-[2px] bg-gray-800 z-0"></div>';
    h += '</div>';

    // 3. 目的地 (到着時間 ＋ 目的地名 ＋ 天気予報)
    var dName = currentCandidate ? currentCandidate.name : "目的地";
    h += '<div class="flex items-center gap-4 relative">';
    h +=   '<div class="w-12 h-12 bg-gray-900 border-2 border-green-500 rounded-full flex items-center justify-center shrink-0 shadow-lg z-10">' + getSvgForIcon('hospital', 'w-6 h-6 text-green-400') + '</div>';
    h +=   '<div class="flex-1 bg-gray-950 border border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-md">';
    h +=     '<div class="flex flex-col gap-0.5">';
    h +=       '<span class="font-black text-xl text-green-400 leading-none">' + formatTimeNoZero(arrTime) + '</span>';
    h +=       '<span class="text-[11px] font-bold text-gray-400 tracking-wider truncate max-w-[120px] mt-1">' + dName + '</span>';
    h +=     '</div>';
    h +=     '<span class="text-xs text-gray-400 font-bold bg-gray-900 px-2 py-1 rounded shrink-0">到着</span>';
    if(wArr) h += '<span class="text-xs font-bold text-gray-300 flex items-center gap-1 bg-gray-900 px-2 py-1 rounded border border-green-500/30 shrink-0">' + wArr + '</span>';
    h +=   '</div>';
    h +=   '<div class="absolute left-6 top-12 bottom-[-16px] w-[2px] bg-gray-800 z-0"></div>';
    h += '</div>';

    // 4. 滞在 (滞在時間)
    var sVal = stayText || "---";
    h += '<div class="flex items-center gap-4 relative">';
    h +=   '<div class="w-12 h-12 bg-gray-900 border-2 border-purple-500 rounded-full flex items-center justify-center shrink-0 shadow-lg z-10">' + getSvgForIcon('cup', 'w-6 h-6 text-purple-400') + '</div>'; // ティーカップ
    h +=   '<div class="flex-1 bg-gray-950 border border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-md">';
    h +=     '<span class="font-black text-xl text-purple-300">' + sVal + '</span>';
    h +=     '<span class="text-xs text-gray-400 font-bold bg-gray-900 px-2 py-1 rounded">滞在</span>';
    h +=   '</div>';
    h +=   '<div class="absolute left-6 top-12 bottom-[-16px] w-[2px] bg-gray-800 z-0"></div>';
    h += '</div>';

    // 5. 帰宅 (帰宅時間 ＋ 天気予報)
    h += '<div class="flex items-center gap-4 relative">';
    h +=   '<div class="w-12 h-12 bg-gray-900 border-2 border-indigo-500 rounded-full flex items-center justify-center shrink-0 shadow-lg z-10">' + getSvgForIcon('home', 'w-6 h-6 text-indigo-400') + '</div>';
    h +=   '<div class="flex-1 bg-gray-950 border border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-md">';
    h +=     '<span class="font-black text-xl text-indigo-300">' + formatTimeNoZero(retTime) + '</span>';
    h +=     '<span class="text-xs text-gray-400 font-bold bg-gray-900 px-2 py-1 rounded">帰宅</span>';
    if(wRet) h += '<span class="text-xs font-bold text-gray-300 flex items-center gap-1 bg-gray-900 px-2 py-1 rounded border border-indigo-500/30">' + wRet + '</span>';
    h +=   '</div>';
    h += '</div>';

    h += '</div>';
    return h;
  }

  // 🌟 縦型タイムラインアコーディオン展開制御
  function toggleTimelineCollapse() {
    var content = document.getElementById('timeline-collapse-content');
    var icon = document.getElementById('timeline-collapse-icon');
    if (content.classList.contains('hidden')) {
      content.classList.remove('hidden');
      content.classList.add('flex');
      icon.style.transform = 'rotate(180deg)';
    } else {
      content.classList.add('hidden');
      content.classList.remove('flex');
      icon.style.transform = 'rotate(0deg)';
    }
    if (isFirstStepCompleted) setTimeout(function(){ adjustInputContainerY(); }, 50);
  }

  // 🌟 【新規】カスタム確認モーダル制御（戻る・キャンセル時）
  function handleBackAction() {
    if (!isFirstStepCompleted) {
      goToDeckScreen(); // STEP1入力前なら即戻る
      return;
    }
    var modal = document.getElementById('confirm-modal');
    if (modal) {
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
  }

  function closeConfirmModal(isConfirm) {
    var modal = document.getElementById('confirm-modal');
    if (modal) {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
    if (isConfirm) {
      goToDeckScreen(); // 「はい」を選択した場合は破棄して戻る
    }
  }

  function goToFormScreen() {
    try {
      resetFormValues();
      var deck = document.getElementById('screen-deck'), form = document.getElementById('screen-form');
      var backBtn = document.getElementById('nav-back-btn'), newBtn = document.getElementById('nav-new-btn');
      
      // 目的地入力中は、上部プレビューやタイムライン、バッジを完全に隠して迷わせない
      var pDest = document.getElementById('preview-dest-area');
      var pTime = document.getElementById('timeline-area-wrapper');
      var pBadg = document.getElementById('badge-area');
      if (pDest) pDest.style.display = 'none';
      if (pTime) pTime.style.display = 'none';
      if (pBadg) pBadg.style.display = 'none';

      // 入力エリアを最上部に配置
      var iC = document.getElementById('input-container');
      if (iC) {
        iC.style.position = 'relative';
        iC.style.top = '0px';
        iC.style.height = 'auto';
      }

      if(deck && form) {
        playAnimation(deck, 'anim-scale-out', 300, function(){
          deck.classList.add('hidden'); deck.classList.remove('flex');
          form.classList.remove('hidden'); form.classList.add('flex');
          playAnimation(form, 'anim-scale-in', 300);
          if(backBtn) { backBtn.classList.remove('hidden'); backBtn.classList.add('flex'); }
          if(newBtn) newBtn.classList.add('hidden');
          animateTitle("新規作成");
          var p1 = document.getElementById('step-1');
          if(p1){ resetPanelStyles(p1); p1.style.display='flex'; validateStep(); updateBadges(); switchInnerTab('master'); }
        });
      }
    } catch(e) { alert("遷移エラー: " + e.message); }
  }

  function goToDeckScreen() {
    try {
      var deck = document.getElementById('screen-deck'), form = document.getElementById('screen-form');
      var backBtn = document.getElementById('nav-back-btn'), newBtn = document.getElementById('nav-new-btn');
      
      if(deck && form) {
        playAnimation(form, 'anim-scale-out', 300, function(){
          form.classList.add('hidden'); form.classList.remove('flex');
          deck.classList.remove('hidden'); deck.classList.add('flex');
          playAnimation(deck, 'anim-scale-in', 300);
          if(backBtn) { backBtn.classList.add('hidden'); backBtn.classList.remove('flex'); }
          if(newBtn) newBtn.classList.remove('hidden');
          animateTitle("お出かけ一覧");
          loadDeckList();
        });
      }
    } catch(e) { alert("遷移エラー: " + e.message); }
  }

  function loadDeckList() {
    var deckListDiv = document.getElementById('deck-list');
    if(!deckListDiv) return;
    deckListDiv.innerHTML = '<div class="text-center py-16 text-gray-500"><span class="animate-spin inline-block text-4xl mb-3">⏳</span><p class="text-lg font-bold tracking-widest">読込中...</p></div>';

    var successHandler = function(list) {
      var counter = document.getElementById('deck-counter'); if(counter) counter.innerText = list.length + " 件";
      if (list.length === 0) {
        deckListDiv.innerHTML = '<div class="text-center py-16 bg-gray-900/40 rounded-2xl border border-gray-800 p-8"><div class="flex justify-center mb-4">' + getSvgForIcon('calendar', 'w-16 h-16 text-gray-600') + '</div><p class="text-gray-400 font-bold text-xl mb-1 tracking-widest">予定なし</p></div>';
        return;
      }

  // 🌟 【不具合解消】決定ボタンのキー不一致（next-5とnext-routeの紐づけエラー）を完全に解消
  function validateStep() {
    var step = editingStep !== null ? editingStep : currentStep;
    var stepStr = getStepIdStr(step);
    if (stepStr === "5") stepStr = "route"; // キー不一致の完全補正
    
    var btn = document.getElementById('btn-next-' + stepStr);
    var disabled = true;
    
    if (step === 1) {
      disabled = !currentCandidate;
      var bM = document.getElementById('btn-master-reg');
      if(bM) {
        if(!disabled) bM.classList.remove('opacity-50','cursor-not-allowed');
        else bM.classList.add('opacity-50','cursor-not-allowed');
      }
    } else if (step === 2) {
      disabled = !document.getElementById('date-input').value;
    } else if (step === 3) {
      var bVal = document.getElementById('bus-time-select').value;
      disabled = !bVal || bVal === "error";
    } else if (step === 4) {
      disabled = !document.getElementById('stay-select').value;
    } else if (step === 5) {
      disabled = (selectedRouteIndex === null);
    }
    
    if (btn) {
      btn.disabled = disabled;
    }
  }

  // 🌟 ステップ移動可能かどうかの判定
  function canLeaveCurrentStep(step) {
    if (step === 1) return !!currentCandidate;
    if (step === 2) return !!document.getElementById('date-input').value;
    if (step === 3) {
      var bVal = document.getElementById('bus-time-select').value;
      return !!bVal && bVal !== "error";
    }
    if (step === 4) return !!document.getElementById('stay-select').value;
    if (step === 5) return (selectedRouteIndex !== null);
    return true;
  }

  // 🌟 編集パネルのクローズ状態制御
  function closeEditPanel(step) {
    var idx = openEditPanels.indexOf(step);
    if (idx !== -1) {
      openEditPanels.splice(idx, 1);
    }
    if (editingStep === step) {
      editingStep = openEditPanels.length > 0 ? openEditPanels[openEditPanels.length - 1] : null;
      currentStep = editingStep !== null ? editingStep : maxReachedStep;
    }
    updatePreview();
  }

  // 🌟 日付変更時の曜日・祝日取得 ＆ プルダウンの平日/土曜/日祝のカラー制御
  function updateDayInfoAndValidate() {
    var dInput = document.getElementById('date-input');
    if (!dInput) return;
    var dStr = dInput.value;
    if (!dStr) {
      validateStep();
      updateBadges();
      return;
    }
    
    if (window.lastFetchedDate !== dStr) {
      window.lastFetchedDate = dStr;
      var bSelect = document.getElementById('bus-time-select');
      if (bSelect) bSelect.innerHTML = '<option value="">▼ 読込中...</option>';
      
      var successHandler = function(res) {
        if (res && !res.error) {
          window.currentDayInfo = res;
          if (bSelect) {
            bSelect.innerHTML = '<option value="">▼ 選択</option>';
            res.busTimes.forEach(function(time) {
              var opt = document.createElement('option');
              opt.value = time;
              opt.text = time;
              bSelect.appendChild(opt);
            });
            if (originalValues.step3) bSelect.value = originalValues.step3;
            
            // 🌟 プルダウン文字色を曜日に合わせて自動着色（平日=白色、土曜日=青色、日祝日=赤色）
            bSelect.className = bSelect.className.replace(/text-[a-z]+-400/g, '').trim() + ' ' + res.colorClass;
          }
          if (res.colorClass) {
            dInput.className = dInput.className.replace(/text-[a-z]+-400/g, '').trim() + ' ' + res.colorClass;
          }
        } else {
          if (bSelect) bSelect.innerHTML = '<option value="error">取得失敗</option>';
        }
        validateStep();
        updatePreview();
        updateBadges();
      };
      
      if (typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(successHandler).withFailureHandler(function() {
          if (bSelect) bSelect.innerHTML = '<option value="error">通信エラー</option>';

        }).getDayInfoForWeb(dStr);
      } else {

          successHandler({
            holiday: "",
            seasonal: "",
            dayType: "平日",

      }

      updateBadges();
    }
  }

  function onBusTimeChange(sel) {
    validateStep();
    updatePreview();
    updateBadges();
  }

  // 🌟 滞在時間選択
  function setStayTime(val, btn) {
    var sInput = document.getElementById('stay-select');
    if (sInput) sInput.value = val;
    document.querySelectorAll('.stay-btn').forEach(function(b) {
      b.classList.remove('bg-blue-600', 'text-white', 'border-blue-400');
      b.classList.add('bg-gray-800', 'text-gray-300', 'border-gray-600');
    });
    if (btn) {
      btn.classList.remove('bg-gray-800', 'text-gray-300', 'border-gray-600');
      btn.classList.add('bg-blue-600', 'text-white', 'border-blue-400');
    }
    validateStep();
    updatePreview();
    updateBadges();
  }

  // 🌟 トースト通知
  function showToast(msg) {
    var t = document.getElementById('toast');
    if (!t) return;
    t.innerText = msg;
    t.classList.add('show');
    clearTimeout(window.toastTimeout);
    window.toastTimeout = setTimeout(function() {
      t.classList.remove('show');
    }, 3000);
  }
